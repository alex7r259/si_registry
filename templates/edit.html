<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Реестр СИ</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        body{
            background:#0f172a;
            color:#e2e8f0;
            font-family:Inter,system-ui,sans-serif;
        }

        .page-title{
            font-size:32px;
            font-weight:700;
            margin-bottom:24px;
        }

        .glass-card{
            background:rgba(15,23,42,.75);
            backdrop-filter:blur(16px);
            border:1px solid rgba(255,255,255,.08);
            border-radius:20px;
            box-shadow:0 10px 40px rgba(0,0,0,.35);
        }

        .card-header{
            background:transparent !important;
            border-bottom:1px solid rgba(255,255,255,.08);
            font-weight:600;
            color:#fff;
        }

        .form-control{
            background:#111827;
            border:1px solid #334155;
            color:#fff;
            border-radius:12px;
            min-height:48px;
        }

        .form-control:focus{
            background:#111827;
            color:#fff;
            border-color:#3b82f6;
            box-shadow:0 0 0 .2rem rgba(59,130,246,.25);
        }

        .table{
            color:#e2e8f0;
        }

        .table thead{
            background:#111827;
        }

        .table td,
        .table th{
            border-color:#1e293b !important;
            vertical-align:middle;
        }

        .table-hover tbody tr:hover{
            background:rgba(255,255,255,.04);
        }

        .btn-primary{
            background:#2563eb;
            border:none;
            border-radius:12px;
            min-height:48px;
            font-weight:600;
        }

        .btn-primary:hover{
            background:#1d4ed8;
        }

        .btn-danger{
            border-radius:10px;
        }

        .btn-secondary{
            border-radius:10px;
        }

        .badge-status{
            padding:8px 12px;
            border-radius:999px;
            font-size:12px;
            font-weight:600;
        }

        .status-ok{
            background:rgba(34,197,94,.2);
            color:#4ade80;
        }

        .status-warning{
            background:rgba(250,204,21,.2);
            color:#facc15;
        }

        .status-danger{
            background:rgba(239,68,68,.2);
            color:#f87171;
        }

        .dataTables_wrapper{
            color:#fff;
        }

        .dataTables_filter input{
            background:#111827 !important;
            color:#fff !important;
            border:1px solid #334155 !important;
        }

        .pagination .page-link{
            background:#111827;
            border-color:#334155;
            color:#fff;
        }

        .pagination .active .page-link{
            background:#2563eb;
            border-color:#2563eb;
        }
    </style>
</head>
<body>
<div class="container py-4">
    <a href="{{ url_for('index') }}" class="btn btn-link mb-3">← Назад</a>
    <div class="card glass-card border-0">
        <div class="card-header">Редактирование СИ</div>
        <div class="card-body">
            <form method="post" class="row g-3">
                <div class="col-md-4"><input required name="device_name" class="form-control" value="{{ instrument.device_name }}"></div>
                <div class="col-md-4"><input name="test_types" class="form-control" value="{{ instrument.test_types }}"></div>
                <div class="col-md-4"><input name="serial_number" class="form-control" value="{{ instrument.serial_number }}"></div>
                <div class="col-md-3"><input type="date" name="last_verification" class="form-control" value="{{ instrument.last_verification }}"></div>
                <div class="col-md-3"><input type="date" name="next_verification" class="form-control" value="{{ instrument.next_verification }}"></div>
                <div class="col-md-3"><input name="certificate_number" class="form-control" value="{{ instrument.certificate_number }}"></div>
                <div class="col-md-3"><input name="passport_info" class="form-control" value="{{ instrument.passport_info }}"></div>
                <div class="col-md-9"><input name="note" class="form-control" value="{{ instrument.note }}"></div>
                <div class="col-md-3 form-check d-flex align-items-center ps-5">
                    <input type="checkbox" class="form-check-input me-2" name="in_verification" id="in_verification" {% if instrument.in_verification %}checked{% endif %}>
                    <label for="in_verification" class="form-check-label">В поверке</label>
                </div>
                <div class="col-12 d-grid"><button class="btn btn-primary">Сохранить</button></div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
