<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Редактирование СИ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <a href="{{ url_for('index') }}" class="btn btn-link mb-3">← Назад</a>
    <div class="card">
        <div class="card-header">Редактирование СИ</div>
        <div class="card-body">
            <form method="post" class="row g-3">
                <div class="col-md-4"><input required name="device_name" class="form-control" value="{{ instrument.device_name }}"></div>
                <div class="col-md-4"><input name="test_types" class="form-control" value="{{ instrument.test_types }}"></div>
                <div class="col-md-4"><input name="serial_number" class="form-control" value="{{ instrument.serial_number }}"></div>
                <div class="col-md-3"><input type="date" name="last_verification" class="form-control" value="{{ instrument.last_verification }}"></div>
                <div class="col-md-3"><input type="date" name="next_verification" class="form-control" value="{{ instrument.next_verification }}"></div>
                <div class="col-md-3"><input name="certificate_number" class="form-control" value="{{ instrument.certificate_number }}"></div>
                <div class="col-md-3"><input name="passport_info" class="form-control" value="{{ instrument.passport_info }}"></div>
                <div class="col-md-9"><input name="note" class="form-control" value="{{ instrument.note }}"></div>
                <div class="col-md-3 form-check d-flex align-items-center ps-5">
                    <input type="checkbox" class="form-check-input me-2" name="in_verification" id="in_verification" {% if instrument.in_verification %}checked{% endif %}>
                    <label for="in_verification" class="form-check-label">В поверке</label>
                </div>
                <div class="col-12 d-grid"><button class="btn btn-primary">Сохранить</button></div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
